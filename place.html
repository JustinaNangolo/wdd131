<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A collection of beautiful places from around the world">
    <meta name="author" content="Justina Nangolo">
    <title>Namibia</title>
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>

</head>
<body>
    <header>
        <h1>Namibia</h1>
    </header>

    <main>
        <section class=" hero">
            <picture>
                <source srcset="images/hero-small.webp" type="image/webp">
                <img src="images/hero-large.webp" alt="Namibia">




















































































































































































































































































































































































































                <source srcset="images/hero-large.webp" media="(min-width: 768px)">
                <img src="images/hero-small.webp" alt="Namibia">
            </picture>

        </section>

        <section class="data">
            <h2>Data</h2>
            <p><strong>Area:</strong> 825,615 km²</p>
            <p><strong>Population:</strong> ~2.5 million</p>
            <p><strong>Capital:</strong> Windhoek</p>
            <p><strong>Language:</strong> English</p>
            <p><strong>currency:</strong> Namibian Dollar (NAD)</p>
            <p><strong>Time Zone:</strong> UTC+2</p>
            <p><strong>Calling Code:</strong> +264</p>
            <p><strong>Internet TLD:</strong> .na</p>
        </section>

        <section class="weather">
            <h2>Weather</h2>
            <img src="images/weather.svg" alt="weather Icon" class="weather-icon">
            <p><strong>Temperature:</strong> 25°C</p>
            <p><strong>Conditions:</strong> Sunny</p>
            <p><strong>Wind:</strong> 10 km/h</p>
            <p><strong>Wind chill:</strong> 17.6°C</p>

        </section>

    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> Justina Nangolo, Namibia</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
