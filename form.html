<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="A product review form for customers to provide feedback on their purchases.">
    <meta name="author" content="Justina Nangolo">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="productName">Product Name</label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating-container">
                    <label for="star1">☆</label>
                    <input type="radio" id="star1" name="rating" value="1" required>
                
                    <label for="star2">☆☆</label>
                    <input type="radio" id="star2" name="rating" value="2" required>
                
                    <label for="star3">☆☆☆</label>
                    <input type="radio" id="star3" name="rating" value="3" required>
                    <label for="star3">☆☆☆</label>

                    <input type="radio" id="star4" name="rating" value="4" required>
                    <label for="star4">☆☆☆☆</label>

                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5">☆☆☆☆☆</label>
                </div>
            </fieldset>

            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required>

            <fieldset class="features-container">
                <legend>Which features did you find useful in the product? (check all that apply)</legend>
        
                <div class="feature-item">
                    <input type="checkbox" id="feature1" name="features" value="durability">
                    <label for="feature1">Durability</label>
                </div>
                <div class="feature-item">
                    <input type="checkbox" id="feature2" name="features" value="ease">
                    <label for="feature2">Ease of Use</label>
                </div>
                <div class="feature-item">
                    <input type="checkbox" id="feature3" name="features" value="performance">
                    <label for="feature3">Performance</label>
                </div>
                <div class="feature-item">
                    <input type="checkbox" id="feature4" name="features" value="design">
                    <label for="feature4">Design</label>   
                </div>
            
            </fieldset>

            <label for="review">Written Review (Optional)</label>
            <textarea id="review" name="review" rows="4"></textarea>

            <label for="userName">Your Name (Optional)</label>
            <input type="text" id="userName" name="userName">

            <input type="submit" value="Post Review">
        </form>
    </main>

    <footer>
        <p>&copy; 2026 🌸 Justina Nangolo 🌸</p>
        <p>Namibia</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
